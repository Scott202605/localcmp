    <title>隐私政策 | LocalCMP</title>

  <body>
    <main class="privacy-page">
      <article class="panel privacy-card">
        <a href="./index.html" class="back-link">返回控制台</a>
        <h1>隐私政策</h1>
        <p>LocalCMP 原型仅展示 CMP 平台的产品交互，不收集真实个人信息、真实客户数据或真实网络标识。</p>
        <h2>Cookie 使用</h2>
        <p>必要 Cookie 用于登录安全、会话保持和偏好保存。体验指标 Cookie 仅在用户授权后用于匿名性能与可用性分析。</p>
        <h2>数据安全</h2>
        <p>生产环境必须启用 HTTPS、最小权限访问、审计日志、密钥遮罩和敏感数据加密存储。</p>
      </article>
    </main>
  </body>
</html>
